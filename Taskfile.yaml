version: "3"

vars:
  PROTO_ROOT: proto
  PROTO_FILE: kmemo/v1/kmemo.proto
  GEN_GO_DIR: gen
  GEN_PY_DIR: python/generated
  # 本地开发用 SQLite 文件（与 internal/storage/cmd/migrate 默认一致）
  KMEMO_DEV_DB: "{{.TASKFILE_DIR}}/kmemo.dev.db"

tasks:
  default:
    desc: List common tasks
    cmds:
      - task --list

  proto:
    desc: Generate Go and Python gRPC code from proto (uses grpcio-tools embedded protoc; requires Go protoc plugins on PATH)
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - mkdir -p {{.GEN_GO_DIR}} {{.GEN_PY_DIR}}/kmemo/v1
      - |
        set -e
        if [ -x "{{.TASKFILE_DIR}}/.venv/bin/python" ]; then
          PY="{{.TASKFILE_DIR}}/.venv/bin/python"
        else
          PY="python3"
        fi
        export PATH="$(go env GOPATH)/bin:$PATH"
        $PY -m grpc_tools.protoc -I {{.PROTO_ROOT}} \
          --go_out={{.GEN_GO_DIR}} --go_opt=paths=source_relative \
          --go-grpc_out={{.GEN_GO_DIR}} --go-grpc_opt=paths=source_relative \
          {{.PROTO_FILE}}
        $PY -m grpc_tools.protoc -I {{.PROTO_ROOT}} \
          --python_out={{.GEN_PY_DIR}} \
          --grpc_python_out={{.GEN_PY_DIR}} \
          {{.PROTO_FILE}}
      - test -f {{.GEN_PY_DIR}}/kmemo/__init__.py || printf '' > {{.GEN_PY_DIR}}/kmemo/__init__.py
      - test -f {{.GEN_PY_DIR}}/kmemo/v1/__init__.py || printf '' > {{.GEN_PY_DIR}}/kmemo/v1/__init__.py

  run:python:
    desc: Start Python gRPC server (run proto first)
    deps: [proto]
    dir: "{{.TASKFILE_DIR}}/python"
    cmds:
      - |
        if [ -x "{{.TASKFILE_DIR}}/.venv/bin/python" ]; then
          exec "{{.TASKFILE_DIR}}/.venv/bin/python" -m app.server
        else
          exec python3 -m app.server
        fi

  run:go:
    desc: Run headless Go host without dialing Python (set KMEMO_SKIP_PYTHON=0 to require worker)
    deps: [proto, db:gen]
    dir: "{{.TASKFILE_DIR}}"
    env:
      KMEMO_SKIP_PYTHON: "1"
    cmds:
      - go run ./cmd/kmemo

  run:go:connected:
    desc: Run headless Go host and dial Python gRPC (worker must be running)
    deps: [proto, db:gen]
    dir: "{{.TASKFILE_DIR}}"
    env:
      KMEMO_SKIP_PYTHON: "0"
    cmds:
      - go run ./cmd/kmemo

  run:wails:
    desc: Wails dev mode (from desktop/; run proto first; Python optional via KMEMO_SKIP_PYTHON)
    deps: [proto, db:gen]
    dir: "{{.TASKFILE_DIR}}/desktop"
    env:
      KMEMO_SKIP_PYTHON: "1"
    cmds:
      - wails dev

  dev:wails:
    desc: 先启动 Python gRPC worker，再运行 wails dev；Go/Python 均使用 debug 级日志并连接 Python（KMEMO_SKIP_PYTHON=0）
    deps: [proto, db:gen]
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - |
        set -eu
        ROOT="{{.TASKFILE_DIR}}"
        if [ -x "$ROOT/.venv/bin/python" ]; then
          PY="$ROOT/.venv/bin/python"
        else
          PY="python3"
        fi
        cd "$ROOT/python"
        export KMEMO_LOG_LEVEL=debug
        export KMEMO_PY_LOG_FILE_ENABLED=1
        export KMEMO_PY_LOG_FILE=kmemo-python.log
        "$PY" -m app.server &
        PY_PID=$!
        cleanup() {
          if kill -0 "$PY_PID" 2>/dev/null; then
            kill "$PY_PID" 2>/dev/null || true
            wait "$PY_PID" 2>/dev/null || true
          fi
        }
        # 仅用 EXIT：部分环境（Task 默认 sh）对 trap 的 INT/TERM 符号名会报 invalid signal
        trap cleanup EXIT
        # 不用 kill -0 判断就绪：在 Task 的 sh 下 $!/后台 PID 偶发不可靠；改探测 gRPC 端口
        worker_ready() {
          if "$PY" -c "import socket; socket.create_connection(('127.0.0.1',50051),timeout=0.5).close()" 2>/dev/null; then
            return 0
          fi
          if "$PY" -c "import socket; socket.create_connection(('::1',50051),timeout=0.5).close()" 2>/dev/null; then
            return 0
          fi
          return 1
        }
        READY=0
        i=0
        while [ "$i" -lt 50 ]; do
          if worker_ready; then
            READY=1
            break
          fi
          i=$((i + 1))
          sleep 0.2
        done
        if [ "$READY" -ne 1 ]; then
          echo "dev:wails: 等待 127.0.0.1:50051 / ::1:50051 超时；请查看上方 Python 报错。" >&2
          cleanup
          exit 1
        fi
        cd "$ROOT/desktop"
        export KMEMO_SKIP_PYTHON=0
        export KMEMO_LOG_LEVEL=debug
        export KMEMO_REPOSITORY_DEBUG=1
        export KMEMO_LOG_FILE_ENABLED=1
        wails dev
        STATUS=$?
        cleanup
        trap - EXIT
        exit "$STATUS"

  test:go:
    desc: Run Go tests
    deps: [proto, db:gen]
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - go test ./...

  test:python:
    desc: Run Python pytest
    deps: [proto]
    dir: "{{.TASKFILE_DIR}}/python"
    cmds:
      - |
        if [ -x "{{.TASKFILE_DIR}}/.venv/bin/python" ]; then
          exec "{{.TASKFILE_DIR}}/.venv/bin/python" -m pytest tests/ -q
        else
          exec python3 -m pytest tests/ -q
        fi

  test:
    desc: Run all tests
    deps: [proto, db:gen]
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - go test ./...
      - |
        cd python
        if [ -x "../.venv/bin/python" ]; then
          ../.venv/bin/python -m pytest tests/ -q
        else
          python3 -m pytest tests/ -q
        fi

  build:go:
    desc: Build headless Go binary
    deps: [proto, db:gen]
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - mkdir -p build
      - go build -o build/kmemo ./cmd/kmemo

  build:wails:
    desc: Build Wails desktop app
    deps: [proto, db:gen]
    dir: "{{.TASKFILE_DIR}}/desktop"
    cmds:
      - wails build

  build:
    desc: Build Go host and Wails app
    deps: [build:go, build:wails]

  dev:
    desc: Regenerate protos; use two terminals for Python + Wails (或一条命令 dev:wails)
    deps: [proto]
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - |
        echo "Protos ready."
        echo "  单终端（Python + Wails + debug 日志）: task dev:wails"
        echo "  双终端: task run:python  与  task run:wails"
        echo "  无 Python: task run:go"

  clean:
    desc: Remove generated code and common build artifacts
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - rm -rf {{.GEN_GO_DIR}}/kmemo
      - rm -f {{.GEN_PY_DIR}}/kmemo/v1/kmemo_pb2.py {{.GEN_PY_DIR}}/kmemo/v1/kmemo_pb2_grpc.py
      - rm -rf build desktop/build desktop/bin desktop/frontend/node_modules .task

  clean:venv:
    desc: Remove .venv（切换 Python 大版本或 grpcio 装失败时，删后重跑 task bootstrap）
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - rm -rf .venv

  lint:
    desc: Lightweight static checks (requires golangci-lint and ruff optional)
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - cmd: golangci-lint run ./... || true
      - cmd: cd python && ( [ -x ../.venv/bin/python ] && ../.venv/bin/python -m ruff check app tests || python3 -m ruff check app tests ) || true

  format:
    desc: Format Go; optional Python with ruff
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - go fmt ./...
      - cmd: cd python && ( [ -x ../.venv/bin/python ] && ../.venv/bin/python -m ruff format app tests || python3 -m ruff format app tests ) || true

  bootstrap:
    desc: Install Go deps, Python venv deps, frontend deps, and Go protoc plugins
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - go mod download
      - test -d .venv || python3 -m venv .venv
      - ./.venv/bin/pip install -r python/requirements.txt
      - cd desktop/frontend && npm install
      - go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.35.1
      - go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1

  db:migrate:
    desc: Run SQLite AutoMigrate (env KMEMO_DB_PATH overrides dev DB path)
    dir: "{{.TASKFILE_DIR}}"
    env:
      KMEMO_DB_PATH: "{{.KMEMO_DEV_DB}}"
    cmds:
      - go run ./internal/storage/cmd/migrate

  db:gen:
    desc: Regenerate GORM Gen DAO into internal/storage/dao
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - go run ./internal/storage/gen

  db:reset:
    desc: Delete dev SQLite file and recreate schema (destructive, dev only)
    dir: "{{.TASKFILE_DIR}}"
    env:
      KMEMO_DB_PATH: "{{.KMEMO_DEV_DB}}"
    cmds:
      - rm -f "{{.KMEMO_DEV_DB}}"
      - task db:migrate

  db:prepare:
    desc: Run migrate then codegen (sequential; after model edits run db:gen alone if only structs changed)
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - task db:migrate
      - task db:gen

  db:check:
    desc: Format and vet storage packages (sanity check after db:gen)
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - gofmt -w internal/storage/models internal/storage/*.go internal/storage/cmd/migrate internal/storage/gen
      - go vet ./internal/storage/...
