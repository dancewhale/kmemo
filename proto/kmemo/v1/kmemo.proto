syntax = "proto3";

package kmemo.v1;

import "google/protobuf/timestamp.proto";

option go_package = "kmemo/gen/kmemo/v1;kmemov1";

// KmemoProcessor is invoked by the Go host; Python holds algorithms and heavy text work.
// All RPCs are unary; streaming is intentionally omitted for now.
service KmemoProcessor {
  rpc SchedulerSetSetting(SchedulerSetSettingRequest) returns (SchedulerSetSettingResponse);
  // Returns the fsrs Python package default Scheduler parameters (fresh Scheduler(), not worker runtime override).
  rpc GetDefaultFsrsParameters(GetDefaultFsrsParametersRequest) returns (GetDefaultFsrsParametersResponse);
  rpc GetCardRetrievability(GetCardRetrievabilityRequest) returns (GetCardRetrievabilityResponse);
  rpc ReviewCard(ReviewCardRequest) returns (ReviewCardResponse);
  rpc RescheduleCard(RescheduleCardRequest) returns (RescheduleCardResponse);
  rpc OptimizeParameters(OptimizeParametersRequest) returns (OptimizeParametersResponse);
  rpc CleanHtml(CleanHtmlRequest) returns (CleanHtmlResponse);
  rpc SubmitImportJob(SubmitImportJobRequest) returns (SubmitImportJobResponse);
  rpc GetJob(GetJobRequest) returns (GetJobResponse);
  rpc ListJobEvents(ListJobEventsRequest) returns (ListJobEventsResponse);
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse);
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);
}

// --- FSRS Scheduler ---

message SchedulerSetting {
  repeated double parameters = 1;
  optional double desired_retention = 2;
  optional int32 maximum_interval = 3;
}

message CardState {
  string state = 1;
  google.protobuf.Timestamp due = 2;
  google.protobuf.Timestamp last_review = 3;
  optional double stability = 4;
  optional double difficulty = 5;
  optional double elapsed_days = 6;
  optional double scheduled_days = 7;
  int32 reps = 8;
  int32 lapses = 9;
  optional string learning_steps_json = 10;
}

message ReviewInput {
  int32 rating = 1;
  google.protobuf.Timestamp reviewed_at = 2;
}

message ReviewLogSnapshot {
  int32 rating = 1;
  string review = 2;
  double elapsed_days = 3;
  double scheduled_days = 4;
  optional double previous_stability = 5;
  optional double previous_difficulty = 6;
  optional double new_stability = 7;
  optional double new_difficulty = 8;
  google.protobuf.Timestamp reviewed_at = 9;
}

message OptimizerReviewLogEntry {
  string card_id = 1;
  int32 rating = 2;
  google.protobuf.Timestamp reviewed_at = 3;
  CardState card_before = 4;
  CardState card_after = 5;
}

message OptimizerConfig {
  optional int32 max_iterations = 1;
  optional bool float_delta_t = 2;
  optional bool enable_short_term = 3;
}

message OptimizerMetrics {
  optional double rmse_bins = 1;
  optional double log_loss = 2;
  optional double calibration = 3;
  optional double optimal_retention = 4;
}

message SchedulerSetSettingRequest {
  SchedulerSetting setting = 1;
}

message SchedulerSetSettingResponse {
  SchedulerSetting effective_setting = 1;
  repeated string warnings = 2;
  optional string diagnostics = 3;
}

message GetDefaultFsrsParametersRequest {}

message GetDefaultFsrsParametersResponse {
  SchedulerSetting builtin_setting = 1;
  optional string fsrs_package_version = 2;
}

message GetCardRetrievabilityRequest {
  string card_id = 1;
  CardState card = 2;
  google.protobuf.Timestamp now = 3;
}

message GetCardRetrievabilityResponse {
  double retrievability = 1;
  google.protobuf.Timestamp evaluated_at = 2;
  SchedulerSetting effective_setting = 3;
  repeated string warnings = 4;
  optional string diagnostics = 5;
}

message ReviewCardRequest {
  string card_id = 1;
  CardState card = 2;
  ReviewInput review = 3;
}

message ReviewCardResponse {
  CardState card = 1;
  ReviewLogSnapshot review_log = 2;
  optional double retrievability = 3;
  SchedulerSetting effective_setting = 4;
  repeated string warnings = 5;
  optional string diagnostics = 6;
}

message RescheduleCardRequest {
  string card_id = 1;
  CardState card = 2;
  google.protobuf.Timestamp reschedule_at = 3;
  repeated ReviewLogSnapshot review_logs = 4;
  optional string mode = 5;
}

message RescheduleCardResponse {
  CardState card = 1;
  ReviewLogSnapshot review_log = 2;
  optional double retrievability = 3;
  SchedulerSetting effective_setting = 4;
  repeated string warnings = 5;
  optional string diagnostics = 6;
}

message OptimizeParametersRequest {
  string request_id = 1;
  string dataset_id = 2;
  string knowledge_id = 3;
  repeated OptimizerReviewLogEntry review_logs = 4;
  SchedulerSetting baseline_setting = 5;
  OptimizerConfig config = 6;
}

message OptimizeParametersResponse {
  SchedulerSetting optimized_setting = 1;
  OptimizerMetrics metrics = 2;
  int32 sample_count = 3;
  int32 dropped_sample_count = 4;
  repeated string warnings = 5;
  optional string diagnostics = 6;
}

// --- CleanHtml ---

message CleanHtmlRequest {
  string source_id = 1;
  string html = 2;
}

message CleanHtmlResponse {
  bool ok = 1;
  string message = 2;
  string cleaned_html = 3;
}

// --- Source Process ---

message ImportOptions {
  string conversion_mode = 1;
  repeated string fallback_modes = 2;
  bool extract_main_content = 3;
  bool sanitize_html = 4;
  bool preserve_semantic_tags = 5;
  bool download_remote_assets = 6;
  bool inline_small_images = 7;
  bool generate_toc = 8;
  bool analyze_structure = 9;
  bool keep_source_copy = 10;
  repeated string enabled_cleaners = 11;
  optional string converter_params_json = 12;
}

message ImportResult {
  string entry_html_path = 1;
  string cleaned_html_path = 2;
  string raw_text_path = 3;
  repeated string assets = 4;
  map<string, string> extracted_metadata = 5;
  string manifest_path = 6;
  string content_hash = 7;
  string effective_conversion_mode = 8;
  string converter_name = 9;
  string converter_version = 10;
  string cleaner_version = 11;
}

message SourceProcessJob {
  string job_id = 1;
  string status = 2;
  string stage = 3;
  float progress = 4;
  optional string result_path = 5;
  optional string error_code = 6;
  optional string error_message = 7;
  optional ImportResult result = 8;
}

message SourceProcessJobEvent {
  string job_id = 1;
  int64 sequence = 2;
  string stage = 3;
  string message = 4;
  int64 created_at_unix = 5;
}

message ConverterCapability {
  string source_type = 1;
  string conversion_mode = 2;
  string converter_name = 3;
  string converter_version = 4;
  string description = 5;
}

message CleanerCapability {
  string cleaner_name = 1;
  string cleaner_version = 2;
  string description = 3;
}

message SubmitImportJobRequest {
  string job_id = 1;
  string source_type = 2;
  optional string source_path = 3;
  optional string source_uri = 4;
  optional string source_url = 5;
  optional string raw_html = 6;
  string workspace_dir = 7;
  string output_dir = 8;
  string temp_dir = 9;
  ImportOptions options = 10;
  map<string, string> metadata = 11;
  optional string idempotency_key = 12;
}

message SubmitImportJobResponse {
  string job_id = 1;
  string status = 2;
  bool accepted = 3;
}

message GetJobRequest {
  string job_id = 1;
}

message GetJobResponse {
  SourceProcessJob job = 1;
}

message ListJobEventsRequest {
  string job_id = 1;
  optional int64 after_sequence = 2;
}

message ListJobEventsResponse {
  repeated SourceProcessJobEvent events = 1;
}

message CancelJobRequest {
  string job_id = 1;
}

message CancelJobResponse {
  string job_id = 1;
  string status = 2;
}

message GetCapabilitiesRequest {}

message GetCapabilitiesResponse {
  repeated string source_types = 1;
  repeated string conversion_modes = 2;
  repeated ConverterCapability converters = 3;
  repeated CleanerCapability cleaners = 4;
}
